# ==============================================================
#  RST.Inventar – Docker Compose Stack
#
#  Services:
#    mariadb          – Datenbank (App + Keycloak)
#    phpmyadmin       – DB-Frontend      → http://localhost:${PHPMYADMIN_PORT}
#    keycloak_db_init – Einmalig: legt Keycloak-DB an
#    keycloak         – Identity Provider → http://localhost:${KEYCLOAK_PORT}
#    app              – PHP/Apache App   → http://localhost:${APP_PORT}
#
#  Alle Ports und Passwörter werden aus der .env gelesen.
#  $$VAR = Shell-Variable (erst im Container aufgelöst)
#  ${VAR} = Compose-Variable (aus .env, beim Start aufgelöst)
# ==============================================================

services:

  # ── MariaDB ─────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: rst_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE:      ${MARIADB_DATABASE}
      MARIADB_USER:          ${MARIADB_USER}
      MARIADB_PASSWORD:      ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./Database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MARIADB_PORT}:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin ───────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: rst_phpmyadmin
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PMA_HOST:     mariadb
      PMA_PORT:     3306
      PMA_USER:     root
      PMA_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT}:80"
    networks:
      - backend
      - frontend

  # ── Keycloak DB Init ─────────────────────────────────────────
  # Einmal-Container: legt Keycloak-Datenbank und User an.
  # $$VAR wird NICHT von Compose aufgelöst → Auflösung durch bash im Container.
  keycloak_db_init:
    image: mariadb:11
    container_name: rst_keycloak_db_init
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      INIT_ROOT_PW: ${MARIADB_ROOT_PASSWORD}
      INIT_DB:      ${KEYCLOAK_DB_NAME}
      INIT_USER:    ${KEYCLOAK_DB_USER}
      INIT_PW:      ${KEYCLOAK_DB_PASSWORD}
    entrypoint: ["bash", "-c"]
    command:
      - >
        mariadb -h mariadb -u root -p"$$INIT_ROOT_PW"
        -e "CREATE DATABASE IF NOT EXISTS $$INIT_DB
              CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS '$$INIT_USER'@'%'
              IDENTIFIED BY '$$INIT_PW';
            GRANT ALL PRIVILEGES ON $$INIT_DB.* TO '$$INIT_USER'@'%';
            FLUSH PRIVILEGES;"
    networks:
      - backend

  # ── Keycloak ─────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: rst_keycloak
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      keycloak_db_init:
        condition: service_completed_successfully
    command: >
      start-dev --import-realm 
      --hostname=192.168.2.181 
      --hostname-strict=false 
      --http-enabled=true 
      --https-certificate-file=/opt/keycloak/conf/server.crt 
      --https-certificate-key-file=/opt/keycloak/conf/server.key
    environment:
      KC_DB:                   mariadb
      KC_DB_URL:               jdbc:mariadb://mariadb:3306/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME:          ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD:          ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./.infra/keycloak/rst-inventar-realm.json:/opt/keycloak/data/import/rst-inventar-realm.json:ro
      - ./.infra/keycloak/themes/rst-inventar:/opt/keycloak/themes/rst-inventar:ro
      - ./.infra/ssl/server.crt:/opt/keycloak/conf/server.crt:ro
      - ./.infra/ssl/server.key:/opt/keycloak/conf/server.key:ro
    ports:
      - "${KEYCLOAK_PORT}:8080"
      - "8443:8443"
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── PHP/Apache Web-Frontend (./app) ──────────────────────────
  # Baut das lokale Dockerfile, mountet ./app nach /var/www/html
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rst_app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST:     mariadb
      DB_PORT:     3306
      DB_NAME:     ${MARIADB_DATABASE}
      DB_USER:     ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      HTTPS:       ${HTTPS}
    volumes:
      - ./app:/var/www/html:ro
      - ./.infra/ssl/server.crt:/etc/apache2/ssl/server.crt:ro
      - ./.infra/ssl/server.key:/etc/apache2/ssl/server.key:ro
      - ./.infra/apache/vhost.conf:/etc/apache2/sites-available/000-default.conf:ro
    ports:
      - "${APP_PORT}:80"
      - "443:443"
    networks:
      - backend
      - frontend

# ── Volumes ──────────────────────────────────────────────────
volumes:
  mariadb_data:
    name: rst_mariadb_data

# ── Netzwerke ────────────────────────────────────────────────
networks:
  backend:
    name: rst_backend
    driver: bridge
  frontend:
    name: rst_frontend
    driver: bridge
